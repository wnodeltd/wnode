name: CI Build and Smoke Test

on:
  push:
    branches: [ "ag/*", "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-wnoder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build dependencies
        run: |
          cd apps/wnoder
          npm ci
      - name: Build
        run: |
          cd apps/wnoder
          npm run build
      - name: Build Docker image
        run: |
          docker build -t ci-wnoder-test:latest -f apps/wnoder/Dockerfile apps/wnoder
      - name: Run smoke test container
        run: |
          docker run -d --name ci-wnoder-test-run -p 127.0.0.1:4001:3000 ci-wnoder-test:latest || true
          sleep 5
          curl -I --max-time 10 http://127.0.0.1:4001 || (docker logs ci-wnoder-test-run && exit 1)
          docker rm -f ci-wnoder-test-run || true
