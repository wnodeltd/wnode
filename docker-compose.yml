services:
  nodld:
    build:
      context: ./nodld
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP/WebSocket API
      - "9000:9000"   # libp2p TCP
      - "9001:9001/udp"  # WebRTC Direct
      - "9002:9002/udp"  # WebTransport
    env_file:
      - ./nodld/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
